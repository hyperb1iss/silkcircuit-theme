  paper-datepicker-accent-color: var(--color-primary)
  paper-datepicker-toggled-color: var(--color-primary)
  paper-datepicker-disabled-color: var(--color-muted-dark)
  paper-datepicker-calendar-color: var(--color-bg-card)
