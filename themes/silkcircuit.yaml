  # Dashboard-facing palette aliases
  purple-color: var(--color-primary)
  pink-color: var(--color-pink)
  light-pink-color: var(--color-pink-light)
  dark-pink-color: var(--color-primary-dark)
  magenta-color: var(--color-magenta)
